name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release:
    name: Prepare and publish release
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set version in manifest.json
        run: |
          version="${{ steps.version.outputs.version }}"
          manifest="${{ github.workspace }}/custom_components/national_grid_us/manifest.json"
          jq --arg v "$version" '.version = $v' "$manifest" > "${manifest}.tmp"
          mv "${manifest}.tmp" "$manifest"

      - name: ZIP integration directory
        run: |
          cd ${{ github.workspace }}/custom_components/national_grid_us
          zip -r national_grid_us.zip ./

      - name: Upload zip to release
        uses: svenstaro/upload-release-action@29e53e917877a24fad85510ded594ab3c9ca12de # v2.11.5
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ github.workspace }}/custom_components/national_grid_us/national_grid_us.zip
          asset_name: national_grid_us.zip
          tag: ${{ github.ref }}
          overwrite: true
