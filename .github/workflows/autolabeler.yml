name: Autolabeler

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions: {}

concurrency:
  group: ${{ format('al-{0}-pr-{1}', github.event_name, github.event.pull_request.number) }}
  cancel-in-progress: true

jobs:
  autolabel:
    name: Autolabel PR
    if: >
      (github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.fork) ||
      (github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: release-drafter/release-drafter/autolabeler@ed4bc48ec97379be2258e7b7ac2624a3e26ab809 # v7.4.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
